<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>📱 Phone Scanner</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e8eaf0;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column}
    .header{background:#1a1d27;border-bottom:1px solid #2a2d3e;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
    .hicon{width:32px;height:32px;border-radius:8px;background:#00d4aa;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .htitle{font-size:13px;font-weight:700;letter-spacing:1px}
    .hsub{font-size:9px;color:#6b7080;margin-top:1px}
    .conn{margin-left:auto;font-size:10px;display:flex;align-items:center;gap:4px;flex-shrink:0}
    .conn-dot{width:7px;height:7px;border-radius:50%;background:#ff4757}
    .conn-dot.on{background:#00d4aa;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .main{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px}
    .settings{display:flex;align-items:center;gap:8px}
    .lang-sel{flex:1;padding:7px 10px;border-radius:6px;border:1px solid #2a2d3e;background:#1a1d27;color:#e8eaf0;font-size:12px;font-family:inherit}
    .voice-cb{display:flex;align-items:center;gap:5px;font-size:12px;color:#6b7080;cursor:pointer;white-space:nowrap;background:#1a1d27;border:1px solid #2a2d3e;border-radius:6px;padding:7px 10px}
    .voice-cb input{accent-color:#00d4aa;cursor:pointer}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .stat{background:#1a1d27;border-radius:8px;padding:10px;text-align:center;border:1px solid #2a2d3e}
    .stat-val{font-size:24px;font-weight:700}
    .stat-lbl{font-size:9px;color:#6b7080;margin-top:2px}
    .prog-bg{background:#1a1d27;border-radius:6px;height:6px;overflow:hidden;border:1px solid #2a2d3e}
    .prog-fill{height:100%;background:#00d4aa;border-radius:6px;transition:width .4s}
    .done-banner{display:none;background:#00d4aa18;border:1px solid #00d4aa;border-radius:10px;padding:12px;text-align:center}
    .done-banner .di{font-size:24px;margin-bottom:4px}
    .done-banner .dt{color:#00d4aa;font-size:13px;font-weight:700}
    .cam-section{background:#1a1d27;border-radius:12px;border:2px solid #2a2d3e;overflow:hidden}
    .cam-header{padding:10px 14px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between}
    .cam-title{font-size:12px;font-weight:700;letter-spacing:1px}
    .cam-toggle{padding:7px 16px;border-radius:6px;background:#00d4aa;color:#0f1117;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
    .cam-toggle.stop{background:#ff4757;color:#fff}
    #reader{width:100%}
    #reader video{width:100%!important}
    .result-box{background:#1a1d27;border:2px solid #2a2d3e;border-radius:10px;padding:12px 14px;transition:border-color .2s,background .2s;min-height:65px}
    .rb-hint{font-size:10px;color:#6b7080;margin-bottom:5px;letter-spacing:1px}
    .rb-code{font-size:16px;color:#3a3d50;font-weight:700;letter-spacing:2px;margin-bottom:3px;word-break:break-all}
    .manual-section{background:#1a1d27;border-radius:10px;border:1px solid #2a2d3e;padding:10px 12px}
    .manual-title{font-size:10px;color:#6b7080;letter-spacing:1px;margin-bottom:7px}
    .manual-row{display:flex;gap:8px}
    .manual-input{flex:1;padding:10px 12px;border-radius:6px;border:1px solid #2a2d3e;background:#0f1117;color:#00d4aa;font-size:15px;font-family:inherit;outline:none;letter-spacing:2px}
    .manual-input::placeholder{color:#3a3d50;font-size:11px;letter-spacing:0}
    .manual-btn{padding:10px 14px;border-radius:6px;background:#00d4aa;color:#0f1117;border:none;font-size:13px;font-weight:700;cursor:pointer}
    .list-section{background:#1a1d27;border-radius:10px;border:1px solid #2a2d3e;overflow:hidden}
    .list-header{padding:10px 14px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .list-title{font-size:10px;color:#6b7080;letter-spacing:1px;white-space:nowrap}
    .search-inp{flex:1;padding:6px 10px;border-radius:6px;border:1px solid #2a2d3e;background:#0f1117;color:#e8eaf0;font-size:12px;font-family:inherit;outline:none}
    .filter-tabs{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid #2a2d3e}
    .ftab{flex:1;padding:5px 0;border-radius:5px;border:1px solid #2a2d3e;background:transparent;color:#6b7080;font-size:10px;cursor:pointer;font-family:inherit;text-align:center}
    .ftab.active{border-color:#00d4aa;background:#00d4aa22;color:#00d4aa}
    .list-body{max-height:300px;overflow-y:auto}
    .list-row{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid #1e2130;gap:8px;transition:background .3s}
    .list-row.confirmed{background:#00d4aa0d}
    .list-row.just-confirmed{animation:flashGreen .8s ease}
    @keyframes flashGreen{0%{background:#00d4aa33}100%{background:#00d4aa0d}}
    .lr-num{width:24px;font-size:10px;color:#6b7080;flex-shrink:0}
    .lr-bc{flex:1;font-size:12px;color:#00d4aa;font-weight:600;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
    .b-ok{background:#00d4aa22;color:#00d4aa}
    .b-pend{background:#ffffff08;color:#6b7080;font-weight:400}
    .empty{padding:30px;text-align:center;color:#6b7080;font-size:12px}
    .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
    .toast.show{opacity:1}
    .toast.ok{background:#00d4aa;color:#0f1117}
    .toast.err{background:#ff4757;color:#fff}
    .toast.warn{background:#ffa502;color:#0f1117}

    /* Edit Modal */
    .modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.show{opacity:1;pointer-events:all}
    .modal{background:#1a1d27;border:1px solid #2a2d3e;border-radius:16px 16px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px 32px}
    .modal-title{font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:4px;color:#00d4aa}
    .modal-bc{font-size:11px;color:#6b7080;margin-bottom:16px;word-break:break-all}
    .modal-fields{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
    .modal-field label{display:block;font-size:10px;color:#6b7080;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
    .modal-field input{width:100%;padding:11px 12px;border-radius:7px;border:1px solid #2a2d3e;background:#0f1117;color:#e8eaf0;font-family:inherit;font-size:16px;outline:none;transition:border-color .2s}
    .modal-field input:focus{border-color:#00d4aa}
    .modal-actions{display:flex;gap:10px}
    .modal-accept{flex:1;padding:14px;border-radius:8px;background:#00d4aa;color:#0f1117;font-family:inherit;font-size:14px;font-weight:700;border:none;cursor:pointer;letter-spacing:1px}
    .modal-skip{padding:14px 18px;border-radius:8px;border:1px solid #2a2d3e;background:transparent;color:#6b7080;font-family:inherit;font-size:13px;cursor:pointer}
  </style>
</head>
<body>

<div class="header">
  <div class="hicon">📱</div>
  <div>
    <div class="htitle">PHONE SCANNER</div>
    <div class="hsub">ស្កែន — 扫描 — Scan</div>
  </div>
  <div class="conn">
    <div class="conn-dot" id="connDot"></div>
    <span id="connTxt" style="color:#ff4757">Offline</span>
  </div>
</div>

<div class="main">

  <div class="settings">
    <label class="voice-cb"><input type="checkbox" id="voiceCb" checked onchange="toggleVoice()"/>🔊</label>
    <select id="langSel" class="lang-sel" onchange="onLangChange()">
      <option value="en" selected>🇺🇸 English</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="km">🇰🇭 ខ្មែរ</option>
    </select>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="stTotal" style="color:#e8eaf0">—</div><div class="stat-lbl">TOTAL</div></div>
    <div class="stat"><div class="stat-val" id="stConf" style="color:#00d4aa">—</div><div class="stat-lbl">已确认</div></div>
    <div class="stat"><div class="stat-val" id="stPend" style="color:#ffa502">—</div><div class="stat-lbl">待扫</div></div>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="done-banner" id="doneBanner">
    <div class="di">🎉</div>
    <div class="dt">ALL DONE — 全部完成 — រួចរាល់!</div>
  </div>

  <div class="cam-section">
    <div class="cam-header">
      <span class="cam-title">📷 CAMERA SCANNER</span>
      <button class="cam-toggle" id="camBtn" onclick="toggleCamera()">▶ START</button>
    </div>
    <div id="reader"></div>
  </div>

  <div class="result-box" id="resultBox">
    <div class="rb-hint">LAST SCAN</div>
    <div class="rb-code" id="rbCode">Waiting for scan...</div>
    <div class="rb-status" id="rbStatus" style="color:#6b7080">Start camera or type barcode</div>
  </div>

  <div class="manual-section">
    <div class="manual-title">⌨ MANUAL / SCANNER GUN — auto confirms</div>
    <div class="manual-row">
      <input type="text" id="manualInput" class="manual-input"
        placeholder="Type or scan here..."
        autocomplete="off"
        oninput="autoScan()"
        onkeydown="if(event.key==='Enter'){ clearTimeout(scanDebounce); sendScan(this.value); }"/>
      <button class="manual-btn" onclick="sendScan(document.getElementById('manualInput').value)">✓</button>
    </div>
  </div>

  <div class="list-section">
    <div class="list-header">
      <span class="list-title">📋 ITEM LIST</span>
      <input class="search-inp" id="srch" placeholder="Search..." oninput="renderList()"/>
    </div>
    <div class="filter-tabs">
      <button class="ftab active" id="fAll"  onclick="setFilter('all')">ALL</button>
      <button class="ftab" id="fConf"        onclick="setFilter('confirmed')">✓ Done</button>
      <button class="ftab" id="fPend"        onclick="setFilter('pending')">○ Pending</button>
    </div>
    <div class="list-body" id="listBody"><div class="empty">Upload Excel on computer first</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Edit Modal (slides up from bottom on phone) -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✓ SCANNED — EDIT DETAILS</div>
    <div class="modal-bc" id="modalBc"></div>
    <div class="modal-fields" id="modalFields"></div>
    <div class="modal-actions">
      <button class="modal-skip" onclick="closeModal()">跳过 SKIP</button>
      <button class="modal-accept" onclick="acceptModal()">✓ 接受 ACCEPT</button>
    </div>
  </div>
</div>

<script>
const socket = io();
let items = [], barcodeCol = '', columns = [];
let voiceOn = true, voices = [], scanning = false, html5QrCode = null;
let filter = 'all', flashTimer, toastTimer, scanDebounce;
let myLastScan = null, justScanned = false;

socket.on('connect', () => {
  document.getElementById('connDot').classList.add('on');
  document.getElementById('connTxt').textContent = 'Online';
  document.getElementById('connTxt').style.color = '#00d4aa';
});
socket.on('disconnect', () => {
  document.getElementById('connDot').classList.remove('on');
  document.getElementById('connTxt').textContent = 'Offline';
  document.getElementById('connTxt').style.color = '#ff4757';
});
socket.on('state', d => {
  if (d.items) { items = d.items; barcodeCol = d.barcodeCol; columns = d.columns; updateStats(); renderList(); }
});
socket.on('data-loaded', d => {
  items = d.items; barcodeCol = d.barcodeCol; columns = d.columns;
  updateStats(); renderList();
  showToast('📊 ' + d.items.length + ' items!', 'ok');
});
socket.on('scan-result', d => showResult(d));
socket.on('item-confirmed', d => {
  const idx = items.findIndex(i => i._id === d.id);
  if (idx !== -1) { items[idx]._confirmed = true; updateStats(); renderList(d.id); }
});
socket.on('reset-all', () => {
  items = items.map(i => ({...i, _confirmed: false}));
  updateStats(); renderList(); showToast('Reset!', 'warn');
});
socket.on('col-changed', d => { barcodeCol = d.barcodeCol; renderList(); });

function updateStats() {
  const conf = items.filter(i => i._confirmed).length;
  const pend = items.length - conf;
  const pct  = items.length ? (conf / items.length * 100) : 0;
  document.getElementById('stTotal').textContent = items.length;
  document.getElementById('stConf').textContent  = conf;
  document.getElementById('stPend').textContent  = pend;
  document.getElementById('progFill').style.width = pct + '%';
  const banner = document.getElementById('doneBanner');
  if (conf === items.length && items.length > 0) { banner.style.display = 'block'; speak('allDone'); }
  else banner.style.display = 'none';
}

function toggleCamera() { if (scanning) stopCamera(); else startCamera(); }
function startCamera() {
  const btn = document.getElementById('camBtn');
  html5QrCode = new Html5Qrcode('reader');
  html5QrCode.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 130 }, aspectRatio: 1.4 },
    (code) => {
      sendScan(code);
      html5QrCode.pause();
      setTimeout(() => { try { html5QrCode.resume(); } catch(e){} }, 1500);
    }, () => {}
  ).then(() => {
    scanning = true; btn.textContent = '⏹ STOP'; btn.classList.add('stop');
  }).catch(err => showToast('Camera error: ' + err, 'err', 4000));
}
function stopCamera() {
  if (html5QrCode) html5QrCode.stop().then(() => {
    scanning = false;
    const btn = document.getElementById('camBtn');
    btn.textContent = '▶ START'; btn.classList.remove('stop');
  });
}

function autoScan() {
  clearTimeout(scanDebounce);
  const val = document.getElementById('manualInput').value.trim();
  if (!val) return;
  scanDebounce = setTimeout(() => sendScan(val), 200);
}

function sendScan(code) {
  code = code?.trim(); if (!code) return;
  document.getElementById('manualInput').value = '';
  justScanned = true;
  socket.emit('scan', code);
}

function showResult(d) {
  const box = document.getElementById('resultBox');
  const rbCode = document.getElementById('rbCode');
  const rbStat = document.getElementById('rbStatus');
  rbCode.textContent = d.code;

  // Only speak + vibrate if THIS phone sent this scan
  const isMyScan = d.isMyScan;
  justScanned = false;

  if (d.confirmed) {
    box.style.borderColor = '#00d4aa'; box.style.background = '#00d4aa18';
    rbCode.style.color = '#00d4aa';
    rbStat.innerHTML = '<span style="color:#00d4aa;font-size:14px;font-weight:700">✓ បានបញ្ជាក់ — 已确认 — Confirmed!</span>';
    if (isMyScan) { speak('confirmed'); navigator.vibrate?.([100]); }
    // Open edit modal on this phone
    if (isMyScan) {
      const confirmedItem = items.find(i => i._id === d.id);
      if (confirmedItem) openEditModal(confirmedItem);
    }
  } else if (d.duplicate) {
    box.style.borderColor = '#ffa502'; box.style.background = '#ffa50218';
    rbCode.style.color = '#ffa502';
    rbStat.innerHTML = '<span style="color:#ffa502">⚠ Already scanned — 重复扫描</span>';
    if (isMyScan) { speak('duplicate'); navigator.vibrate?.([50,50,50]); }
  } else {
    box.style.borderColor = '#ff4757'; box.style.background = '#ff475718';
    rbCode.style.color = '#ff4757';
    const sug = d.suggestions?.length ? '<br><span style="color:#6b7080;font-size:10px">Similar: ' + d.suggestions.join(', ') + '</span>' : '';
    rbStat.innerHTML = '<span style="color:#ff4757">✗ Not found — 未找到</span>' + sug;
    if (isMyScan) { speak('notFound'); navigator.vibrate?.([200]); }
  }
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { box.style.borderColor = '#2a2d3e'; box.style.background = 'transparent'; }, 1500);
}

function setFilter(f) {
  filter = f;
  ['All','Conf','Pend'].forEach(n => document.getElementById('f'+n).classList.remove('active'));
  document.getElementById('f' + f.charAt(0).toUpperCase() + f.slice(1).slice(0,3)).classList.add('active');
  renderList();
}

function renderList(flashId) {
  const srch = document.getElementById('srch').value.toLowerCase();
  const body = document.getElementById('listBody');
  if (!items.length) { body.innerHTML = '<div class="empty">Upload Excel on computer first</div>'; return; }
  const filtered = items.filter(item => {
    const ms = !srch || Object.values(item).some(v => String(v).toLowerCase().includes(srch));
    const mf = filter === 'all' || (filter === 'confirmed' && item._confirmed) || (filter === 'pending' && !item._confirmed);
    return ms && mf;
  });
  if (!filtered.length) { body.innerHTML = '<div class="empty">No items</div>'; return; }
  body.innerHTML = filtered.map((item, i) => {
    const flash = flashId !== undefined && item._id === flashId ? ' just-confirmed' : '';
    return `<div class="list-row${item._confirmed ? ' confirmed' : ''}${flash}">
      <div class="lr-num">${i+1}</div>
      <div class="lr-bc">${item[barcodeCol] || '—'}</div>
      <div class="lr-st">${item._confirmed ? '<span class="badge b-ok">✓</span>' : '<span class="badge b-pend">待</span>'}</div>
    </div>`;
  }).join('');
}

// Speech — unlock on first interaction (mobile fix)
let speechUnlocked = false;
function unlockSpeech() {
  if (speechUnlocked) return;
  speechUnlocked = true;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0;
  window.speechSynthesis.speak(u);
}
document.addEventListener('touchstart', unlockSpeech, { once: true });
document.addEventListener('click', unlockSpeech, { once: true });

const PHRASES = {
  en: { confirmed:'Confirmed', duplicate:'Already scanned', notFound:'Not found', voiceOn:'Voice enabled', allDone:'All done' },
  zh: { confirmed:'已确认', duplicate:'重复扫描', notFound:'未找到', voiceOn:'语音已开启', allDone:'全部完成' },
  km: { confirmed:'បានបញ្ជាក់', duplicate:'បានស្កែនរួចហើយ', notFound:'រកមិនឃើញ', voiceOn:'បើកសំឡេងហើយ', allDone:'រួចរាល់ហើយ' }
};

// Always fetch fresh voices — fixes async load issue
function getVoices() {
  return window.speechSynthesis.getVoices();
}

function waitForVoices() {
  return new Promise(resolve => {
    const v = window.speechSynthesis.getVoices();
    if (v.length) return resolve(v);
    window.speechSynthesis.onvoiceschanged = () => resolve(window.speechSynthesis.getVoices());
  });
}

function findKhmerVoice() {
  const all = getVoices();
  return all.find(v =>
    v.lang.startsWith('km') ||
    v.lang.toLowerCase().includes('khm') ||
    v.name.toLowerCase().includes('khmer') ||
    v.name.toLowerCase().includes('cambodia')
  );
}

function speakOne(text, lang) {
  return new Promise(async res => {
    const all = await waitForVoices();
    const u = new SpeechSynthesisUtterance(text);

    if (lang === 'zh') {
      u.lang = 'zh-CN';
      const v = all.find(v => v.lang.startsWith('zh'));
      if (v) u.voice = v;

    } else if (lang === 'km') {
      const kv = all.find(v =>
        v.lang.startsWith('km') ||
        v.lang.toLowerCase().includes('khm') ||
        v.name.toLowerCase().includes('khmer') ||
        v.name.toLowerCase().includes('cambodia')
      );
      if (kv) {
        u.voice = kv;
        u.lang = kv.lang || 'km-KH';
        u.rate = 0.85;
      }
      // No Khmer voice? just speak with default voice (no skip, no toast)

    } else {
      u.lang = 'en-US';
      const v = all.find(v => v.lang.startsWith('en'));
      if (v) u.voice = v;
    }

    u.onend = res;
    u.onerror = res;
    window.speechSynthesis.speak(u);
  });
}

async function speak(key) {
  if (!voiceOn) return;
  unlockSpeech();
  window.speechSynthesis.cancel();
  const lang = document.getElementById('langSel')?.value || 'en';
  const t = PHRASES[lang]?.[key];
  if (t) await speakOne(t, lang);
}

function toggleVoice() {
  voiceOn = document.getElementById('voiceCb').checked;
  if (voiceOn) speak('voiceOn');
}

function onLangChange() {
  speak('voiceOn');
}

socket.on('item-updated', d => {
  const idx = items.findIndex(i => i._id === d.id);
  if (idx !== -1) { items[idx] = { ...items[idx], ...d.updates }; renderList(); }
});

let modalItemId = null;

function openEditModal(item) {
  modalItemId = item._id;
  document.getElementById('modalBc').textContent = '📦 ' + item[barcodeCol];
  const fieldsEl = document.getElementById('modalFields');
  fieldsEl.innerHTML = '';
  columns.forEach(col => {
    if (col === barcodeCol) return;
    const div = document.createElement('div');
    div.className = 'modal-field';
    div.innerHTML = `<label>${col}</label><input id="mf_${CSS.escape(col)}" type="text" inputmode="decimal" value="${String(item[col] || '')}" placeholder="—"/>`;
    fieldsEl.appendChild(div);
  });
  document.getElementById('editModal').classList.add('show');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
  modalItemId = null;
}

async function acceptModal() {
  if (modalItemId === null) return;
  const updates = {};
  columns.forEach(col => {
    if (col === barcodeCol) return;
    const el = document.getElementById('mf_' + CSS.escape(col));
    if (el) updates[col] = el.value;
  });
  const idx = items.findIndex(i => i._id === modalItemId);
  if (idx !== -1) { items[idx] = { ...items[idx], ...updates }; renderList(); }
  await fetch('/update-item', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: modalItemId, updates })
  });
  closeModal();
  showToast('✓ Saved!', 'ok');
}

document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function showToast(msg, type, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), dur);
}
</script>
</body>
</html>
